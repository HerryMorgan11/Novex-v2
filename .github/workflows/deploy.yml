name: ERP CI-CD Deployment

on:
  push:
    branches: [ main, develop, workos ]
  pull_request:
    branches: [ main ]

jobs:
  # --- ETAPA 1: TEST Y CALIDAD ---
  tests:
    name: Run Tests & Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, mysql, sqlite3
          tools: composer:v2

      - name: Flux UI Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install PHP Dependencies
        run: composer install -q --no-interaction --prefer-dist

      - name: Install Node Dependencies & Build
        run: |
          npm install
          npm run build

      # --- SOLUCIÓN AL ERROR DE APP_KEY ---
      - name: Prepare Environment for Tests
        run: |
          cp .env.example .env
          php artisan key:generate
      # ------------------------------------

      - name: Quality Check (Pint)
        run: ./vendor/bin/pint --test

      - name: Run PHPUnit
        # Forzamos sqlite en memoria para que los tests no necesiten un servidor MySQL real
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  # --- ETAPA 2: DESPLIEGUE (Solo si es 'main' y los tests pasaron) ---
  deploy:
    name: Deploy to Amazon Linux
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.