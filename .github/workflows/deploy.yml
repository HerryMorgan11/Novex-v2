name: ERP CI-CD Deployment

on:
  push:
    branches: [ main, develop, workos ]
  pull_request:
    branches: [ main ]

jobs:
  # --- ETAPA 1: TEST, CALIDAD Y COMPILACIÓN ---
  tests:
    name: Run Tests & Build Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, mysql, sqlite3
          tools: composer:v2

      - name: Flux UI Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install PHP Dependencies
        run: composer install -q --no-interaction --prefer-dist

      - name: Install Node Dependencies & Build Assets (Vite)
        run: |
          npm install
          npm run build

      - name: Prepare Environment for Tests
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Quality Check (Pint)
        run: ./vendor/bin/pint --test

      - name: Run PHPUnit
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      # Guardamos el build de Vite como un "artefacto" para que el job de deploy lo use
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: public/build/

  # --- ETAPA 2: DESPLIEGUE (Solo para 'main') ---
  deploy:
    name: Deploy to Amazon Linux
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Recuperamos el build compilado en el Job anterior
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: vite-build
          path: public/build/

      # 1. Enviamos la carpeta public/build por SCP (Muy ligero para el servidor)
      - name: Upload Build Folder to AWS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/build"
          target: "/var/www/novex"

      # 2. Ejecutamos comandos ligeros por SSH
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
              cd /var/www/novex
              
              # 1. Forzar que el código local sea IDÉNTICO a GitHub main
              git fetch origin main
              git reset --hard origin/main
              
              # 2. Permisos correctos para los archivos que subimos por SCP
              sudo chown -R ec2-user:ec2-user public/build
              
              # 3. Reinicio agresivo de Docker
              docker-compose down
              docker-compose up -d --build --force-recreate
              
              # 4. Limpieza profunda de Laravel
              docker exec erp-app php artisan optimize:clear
              docker exec erp-app php artisan migrate --force
              docker exec erp-app php artisan optimize
              
              # 5. Permisos finales (para que Laravel pueda escribir logs/cache)
              sudo chown -R ec2-user:ec2-user storage bootstrap/cache
              docker exec -u root erp-app chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache
