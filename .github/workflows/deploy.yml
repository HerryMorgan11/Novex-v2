name: Deploy Second Life Platform - Amazon Linux

# 1. RESTRICCIÓN DE RAMA: Solo ejecuta en main
on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecución manual para regenerar el grafo

jobs:
  build-and-test:
    name: Build & Backend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python (FastAPI)
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install paho-mqtt # Necesario para la nueva lógica del PLC

      - name: Lint & Syntax Check
        run: |
          # Validación de sintaxis antes del despliegue
          python -m compileall .

  deploy-to-amazon-linux:
    name: Deploy to Amazon Linux (Production)
    needs: build-and-test
    # 2. TARGET ESPECÍFICO: Solo servidores Amazon Linux
    runs-on: [self-hosted, linux, amazon-linux]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Update Services
        run: |
          sudo systemctl stop second-life-api
          # Sincronización de archivos
          rsync -avz --exclude '.git' ./ /var/www/second-life/
          
      - name: Configure PLC Control Bridge
        run: |
          # Configuración de permisos para la escritura MQTT 
          # necesaria para el nuevo alcance de iluminación
          echo "Configurando ACLs para comunicación bidireccional..."
          chmod +x scripts/plc_control_sync.sh
          ./scripts/plc_control_sync.sh

      - name: Restart and Verify
        run: |
          sudo systemctl start second-life-api
          sudo systemctl status second-life-api --no-pager